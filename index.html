<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Princeskuh Awa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffb6c1, #ff69b4, #ff1493);
            background-size: 400% 400%;
            animation: gradientBG 6s ease infinite;
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Hati-hati berjatuhan */
        .hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .heart {
            position: absolute;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.3);
            animation: fall linear infinite;
            user-select: none;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        /* Kartu Surat */
        .envelope-wrapper {
            position: relative;
            z-index: 1;
            perspective: 800px;
        }

        .letter {
            width: 420px;
            max-width: 90vw;
            background: #8B5A2B;
            background: linear-gradient(145deg, #a0522d, #6b3a1f);
            padding: 50px 40px 40px;
            border-radius: 12px 12px 12px 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 2px #d4a373 inset, 0 0 0 4px #f5e6d3 inset;
            text-align: center;
            position: relative;
            animation: floatIn 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }

        .letter:hover {
            transform: rotateY(2deg) rotateX(1deg) scale(1.01);
        }

        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: scale(0.8) rotateY(-15deg) translateY(40px);
            }
            60% {
                transform: scale(1.02) rotateY(3deg) translateY(-8px);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateY(0deg) translateY(0);
            }
        }

        /* Lipatan surat (dekorasi) */
        .letter::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px dashed rgba(255, 215, 175, 0.3);
            border-radius: 8px;
            pointer-events: none;
        }

        .letter h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #f5e6d3;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        .letter .sub {
            font-size: 0.9rem;
            color: #f0d5b0;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 25px;
            border-top: 1px solid rgba(245, 230, 211, 0.2);
            border-bottom: 1px solid rgba(245, 230, 211, 0.2);
            padding: 8px 0;
            display: inline-block;
        }

        /* Tombol di tengah surat */
        .btn-open {
            display: inline-block;
            margin-top: 15px;
            padding: 16px 44px;
            background: #f5e6d3;
            color: #5a2d0c;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border: 2px solid #d4a373;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            font-family: 'Georgia', serif;
            cursor: pointer;
        }

        .btn-open::before {
            content: '💌';
            margin-right: 10px;
            font-size: 1.2rem;
        }

        .btn-open:hover {
            transform: scale(1.08);
            background: #fff8f0;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            border-color: #b8860b;
        }

        .btn-open:active {
            transform: scale(0.95);
        }

        /* Efek kilau */
        .btn-open::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(25deg);
            transition: 0.6s;
        }

        .btn-open:hover::after {
            left: 120%;
        }

        /* Stiker dekoratif */
        .stamp {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 2.8rem;
            transform: rotate(12deg);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
            animation: stampFloat 3s ease-in-out infinite;
        }

        @keyframes stampFloat {
            0%, 100% { transform: rotate(12deg) scale(1); }
            50% { transform: rotate(15deg) scale(1.05); }
        }

        /* Garis dekoratif */
        .ornament {
            font-size: 1.2rem;
            color: #d4a373;
            letter-spacing: 8px;
            margin: 10px 0 6px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .letter {
                padding: 30px 20px 30px;
            }
            .letter h1 {
                font-size: 1.5rem;
            }
            .btn-open {
                padding: 12px 28px;
                font-size: 0.9rem;
            }
            .stamp {
                font-size: 2rem;
                top: -6px;
                right: -6px;
            }
        }
    </style>
</head>
<body>

    <!-- Hati Berjatuhan -->
    <div class="hearts" id="heartsContainer"></div>

    <!-- Kartu Surat -->
    <div class="envelope-wrapper">
        <div class="letter">
            <div class="stamp">💖</div>
            <div class="ornament">✦ ✦ ✦</div>
            <h1>Untuk Princeskuh Awa</h1>
            <div class="sub">— dari seseorang yang selalu memilihmu —</div>
            <div class="ornament">✦ ✦ ✦</div>
            <p style="color: #f0d5b0; font-size: 0.95rem; margin: 16px 0 20px; line-height: 1.6; opacity: 0.9; font-style: italic;">
                "Kata-kata tak cukup. Tapi surat ini kubuat<br>dengan sisa-sisa keberanian yang masih tersisa."
            </p>
            <!-- Tombol ke slide kedua -->
            <a href="#" class="btn-open" id="btnToSlide2">Buka Suratnya</a>
        </div>
    </div>

    <script>
        // Generate hati berjatuhan
        const heartsContainer = document.getElementById('heartsContainer');
        const heartSymbols = ['❤️', '💕', '💗', '💖', '💘', '🌸', '✨'];

        for (let i = 0; i < 35; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 24 + 14) + 'px';
            heart.style.animationDuration = (Math.random() * 10 + 8) + 's';
            heart.style.animationDelay = (Math.random() * 12) + 's';
            heartsContainer.appendChild(heart);
        }

        // Tombol menuju slide kedua
        document.getElementById('btnToSlide2').addEventListener('click', function(e) {
            e.preventDefault();
            alert('✨ Slide kedua akan segera hadir, Princeskuh Awa! 💌');
            // Jika ingin pindah ke halaman slide2.html:
            // window.location.href = 'slide2.html';
        });
    </script>

</body>
</html>
