<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Princeskuh Awa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffb6c1, #ff69b4, #ff1493, #ff6b9d);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow: hidden;
            position: relative;
            margin: 0;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Hati dan Bunga Berjatuhan */
        .falling-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .falling-item {
            position: absolute;
            top: -10%;
            font-size: 28px;
            animation: fallDown linear infinite;
            user-select: none;
            opacity: 0.7;
        }

        @keyframes fallDown {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) rotate(720deg) scale(0.2);
                opacity: 0;
            }
        }

        /* Wrapper surat */
        .envelope-wrapper {
            position: relative;
            z-index: 1;
            perspective: 1000px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Surat */
        .letter {
            width: 480px;
            max-width: 92vw;
            background: linear-gradient(160deg, #a0522d, #7a3b1e, #5c2d14);
            padding: 45px 45px 40px;
            border-radius: 14px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.6),
                0 0 0 3px #c49a6c inset,
                0 0 0 6px #e8d5b8 inset,
                0 0 0 8px #b87c4b inset;
            text-align: center;
            position: relative;
            animation: floatIn 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            transition: transform 0.4s ease;
        }

        .letter:hover {
            transform: rotateY(2deg) rotateX(1deg) scale(1.01);
        }

        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: scale(0.7) rotateY(-20deg) translateY(50px);
            }
            60% {
                transform: scale(1.02) rotateY(3deg) translateY(-10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateY(0deg) translateY(0);
            }
        }

        /* Dekorasi border dalam */
        .letter::before {
            content: '';
            position: absolute;
            top: 14px;
            left: 14px;
            right: 14px;
            bottom: 14px;
            border: 1.5px dashed rgba(232, 213, 184, 0.25);
            border-radius: 8px;
            pointer-events: none;
        }

        /* Garis ornamen atas */
        .ornament-top {
            font-size: 1.1rem;
            color: #d4a373;
            letter-spacing: 10px;
            margin-bottom: 12px;
            opacity: 0.6;
            display: block;
        }

        /* Judul utama */
        .letter h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #f5e6d3;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.6);
            letter-spacing: 2px;
            margin-bottom: 6px;
            font-family: 'Georgia', 'Times New Roman', serif;
            word-wrap: break-word;
        }

        /* Subjudul — TIDAK NYAMBUNG KE BAWAH */
        .letter .sub {
            display: block;
            font-size: 0.85rem;
            color: #eedbc0;
            letter-spacing: 3px;
            text-transform: lowercase;
            opacity: 0.85;
            margin: 8px auto 14px auto;
            padding: 6px 18px;
            border-top: 1px solid rgba(232, 213, 184, 0.2);
            border-bottom: 1px solid rgba(232, 213, 184, 0.2);
            width: fit-content;
            max-width: 100%;
            font-style: italic;
            font-weight: 300;
            word-break: keep-all;
            white-space: nowrap;
        }

        /* Ornamen bawah */
        .ornament-bottom {
            font-size: 1.1rem;
            color: #d4a373;
            letter-spacing: 10px;
            margin: 10px 0 14px;
            opacity: 0.5;
            display: block;
        }

        /* Kutipan */
        .letter .quote {
            color: #eedbc0;
            font-size: 0.95rem;
            line-height: 1.7;
            opacity: 0.9;
            font-style: italic;
            margin: 6px 0 18px;
            padding: 0 10px;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .letter .quote br {
            display: block;
            content: '';
            margin: 2px 0;
        }

        /* Tombol di tengah surat */
        .btn-open {
            display: inline-block;
            margin-top: 8px;
            padding: 16px 44px;
            background: linear-gradient(145deg, #f5e6d3, #e8d5b8);
            color: #4a2008;
            font-size: 1.05rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            border: 2px solid #c49a6c;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            font-family: 'Georgia', serif;
            cursor: pointer;
        }

        .btn-open::before {
            content: '💌';
            margin-right: 10px;
            font-size: 1.1rem;
        }

        .btn-open:hover {
            transform: scale(1.08) translateY(-2px);
            background: linear-gradient(145deg, #fff8f0, #f5e6d3);
            box-shadow: 0 14px 36px rgba(0,0,0,0.5);
            border-color: #b8860b;
        }

        .btn-open:active {
            transform: scale(0.95);
        }

        /* Efek kilau tombol */
        .btn-open::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: rotate(25deg);
            transition: 0.6s;
        }

        .btn-open:hover::after {
            left: 120%;
        }

        /* Stiker perangko */
        .stamp {
            position: absolute;
            top: -8px;
            right: -8px;
            font-size: 2.8rem;
            transform: rotate(12deg);
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
            animation: stampFloat 3s ease-in-out infinite;
        }

        @keyframes stampFloat {
            0%, 100% { transform: rotate(12deg) scale(1); }
            50% { transform: rotate(16deg) scale(1.06); }
        }

        /* Responsive */
        @media (max-width: 550px) {
            .letter {
                padding: 30px 22px 28px;
            }
            .letter h1 {
                font-size: 1.7rem;
            }
            .letter .sub {
                font-size: 0.7rem;
                letter-spacing: 2px;
                padding: 4px 12px;
                white-space: normal;
            }
            .letter .quote {
                font-size: 0.82rem;
            }
            .btn-open {
                padding: 12px 28px;
                font-size: 0.9rem;
            }
            .stamp {
                font-size: 2rem;
                top: -4px;
                right: -4px;
            }
            .ornament-top,
            .ornament-bottom {
                font-size: 0.9rem;
                letter-spacing: 6px;
            }
        }

        @media (max-width: 400px) {
            .letter h1 {
                font-size: 1.3rem;
            }
            .letter .sub {
                font-size: 0.6rem;
                white-space: normal;
            }
            .btn-open {
                padding: 10px 20px;
                font-size: 0.75rem;
            }
            .btn-open::before {
                content: '💌';
                margin-right: 6px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- Hati dan Bunga Berjatuhan -->
    <div class="falling-container" id="fallingContainer"></div>

    <!-- Kartu Surat -->
    <div class="envelope-wrapper">
        <div class="letter">
            <div class="stamp">💖</div>
            <span class="ornament-top">✦ ✦ ✦</span>
            <h1>Untuk Princeskuh Awa</h1>
            <span class="sub">– dari seseorang yang selalu memilihmu –</span>
            <span class="ornament-bottom">✦ ✦ ✦</span>
            <p class="quote">
                "Kata-kata tak cukup. Tapi surat ini kubuat<br>
                dengan sisa-sisa keberanian yang masih tersisa."
            </p>
            <!-- Tombol ke slide kedua -->
            <a href="#" class="btn-open" id="btnToSlide2">Buka Suratnya</a>
        </div>
    </div>

    <script>
        // ===== HATI & BUNGA BERJATUHAN =====
        const container = document.getElementById('fallingContainer');
        const items = ['❤️', '💕', '💗', '💖', '💘', '🌸', '🌺', '🌷', '✨', '🌹', '💝', '🌼'];

        // Buat 45 elemen jatuh
        for (let i = 0; i < 45; i++) {
            const el = document.createElement('div');
            el.className = 'falling-item';
            el.textContent = items[Math.floor(Math.random() * items.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = (Math.random() * 28 + 16) + 'px';
            el.style.animationDuration = (Math.random() * 12 + 8) + 's';
            el.style.animationDelay = (Math.random() * 15) + 's';
            el.style.opacity = (Math.random() * 0.5 + 0.3);
            container.appendChild(el);
        }

        // ===== TOMBOL MENUJU SLIDE KEDUA =====
        document.getElementById('btnToSlide2').addEventListener('click', function(e) {
            e.preventDefault();
            alert('✨ Slide kedua akan segera hadir, Princeskuh Awa! 💌');
            // Jika ingin pindah ke halaman slide2.html:
            // window.location.href = 'slide2.html';
        });
    </script>

</body>
</html>
